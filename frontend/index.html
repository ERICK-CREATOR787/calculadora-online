<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CalcPro — Calculadora Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <main class="container">
    <header class="header">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">CalcPro</span>
      </div>
      <div class="status-badge">
        <span class="status-dot"></span>
        <span id="status-label">Conectado</span>
      </div>
    </header>

    <div class="layout">
      <!-- Calculadora -->
      <section class="calc-card">
        <div class="display-area">
          <div class="expression" id="expression">0</div>
          <div class="result-preview" id="result-preview"></div>
        </div>

        <div class="keypad">
          <!-- Linha 1 -->
          <button class="btn btn-func" onclick="limpar()">AC</button>
          <button class="btn btn-func" onclick="toggleSign()">+/−</button>
          <button class="btn btn-func" onclick="percentagem()">%</button>
          <button class="btn btn-op" onclick="addOp('/')">÷</button>

          <!-- Linha 2 -->
          <button class="btn btn-num" onclick="addNum('7')">7</button>
          <button class="btn btn-num" onclick="addNum('8')">8</button>
          <button class="btn btn-num" onclick="addNum('9')">9</button>
          <button class="btn btn-op" onclick="addOp('*')">×</button>

          <!-- Linha 3 -->
          <button class="btn btn-num" onclick="addNum('4')">4</button>
          <button class="btn btn-num" onclick="addNum('5')">5</button>
          <button class="btn btn-num" onclick="addNum('6')">6</button>
          <button class="btn btn-op" onclick="addOp('-')">−</button>

          <!-- Linha 4 -->
          <button class="btn btn-num" onclick="addNum('1')">1</button>
          <button class="btn btn-num" onclick="addNum('2')">2</button>
          <button class="btn btn-num" onclick="addNum('3')">3</button>
          <button class="btn btn-op" onclick="addOp('+')">+</button>

          <!-- Linha 5 -->
          <button class="btn btn-num btn-zero" onclick="addNum('0')">0</button>
          <button class="btn btn-num" onclick="addDecimal()">.</button>
          <button class="btn btn-equal" onclick="calcular()">=</button>
        </div>
      </section>

      <!-- Histórico -->
      <aside class="history-panel">
        <div class="history-header">
          <h2 class="history-title">Histórico</h2>
          <button class="btn-clear-history" onclick="limparHistorico()">Limpar</button>
        </div>
        <div class="history-list" id="history-list">
          <div class="history-empty">
            <span class="history-empty-icon">∅</span>
            <p>Nenhum cálculo ainda</p>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
